name: braintrust

services:
  slack-agent:
    build:
      context: ../slack-agent
    env_file:
      - ./.env
    environment:
      PORT: ${SLACK_AGENT_PORT:-3000}
      MCP_SERVER_URL: http://mcp-server:${MCP_SERVER_PORT:-8000}/mcp
      BACKEND_API_URL: http://backend:8888/api/v1
      KAFKA_BROKERS: kafka:${KAFKA_PORT:-9092}
      KAFKA_CLIENT_ID: slack-agent
      KAFKA_CONSUMER_GROUP_ID: slack-agent-consumer
    ports:
      - "${SLACK_AGENT_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
      kafka:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >
          fetch('http://127.0.0.1:3000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    env_file:
      - ./.env
    environment:
      PORT: 8888
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-braintrust}:${POSTGRES_PASSWORD:-braintrust}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-braintrust}
      NEO4J_URI: bolt://neo4j:${NEO4J_BOLT_PORT:-7687}
      KAFKA_CLIENT_ID: backend
      KAFKA_CONSUMER_GROUP_ID: backend-consumer
    ports:
      - "${BACKEND_PORT:-8001}:8888"
    depends_on:
      postgres:
        condition: service_started
      neo4j:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >
          import urllib.request; urllib.request.urlopen('http://127.0.0.1:8888/api/v1/health')
      interval: 15s
      timeout: 5s
      retries: 5

  mcp-server:
    build:
      context: ../mcp-server
    env_file:
      - ./.env
    environment:
      HOST: 0.0.0.0
      PORT: ${MCP_SERVER_PORT:-8000}
    ports:
      - "${MCP_SERVER_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >
          import socket; socket.create_connection(('127.0.0.1', 8000), 2).close()
      interval: 15s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-braintrust-kraft-cluster}
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "${KAFKA_CONTROLLER_PORT:-9093}:9093"

  kafka-init:
    image: apache/kafka:3.9.0
    depends_on:
      kafka:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
    command:
      - >
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do
          echo "Waiting for Kafka...";
          sleep 2;
        done;
        for topic in
        slack-agent.offboarding.triggered
        slack-agent.offboarding.cancellation_requested
        slack-agent.interview.started
        slack-agent.interview.completed
        slack-agent.interview.turn_recorded
        slack-agent.tasks.extracted
        slack-agent.dossier.generation_requested
        slack-agent.sop.creation_requested
        slack-agent.sop.candidate_offered
        slack-agent.sop.candidate_decided
        slack-agent.knowledge_graph.interaction_registered
        slack-agent.knowledge_graph.document_registered
        slack-agent.knowledge_graph.channel_activity_registered
        slack-agent.monthly_review.interview_completed
        slack-agent.monthly_review.dossier_generation_requested
        slack-agent.annual_review.interview_completed
        slack-agent.annual_review.dossier_generation_requested
        offboarding.offboarding.state_changed
        offboarding.interview.completed
        offboarding.dossier.generated
        offboarding.offboarding.completed
        offboarding.sop.created
        offboarding.monthly_review.state_changed
        offboarding.annual_review.state_changed
        slack-agent.dlq;
        do
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic "$$topic" --partitions 1 --replication-factor 1;
        done

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_CLUSTERS_0_NAME: braintrust
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-braintrust}
      POSTGRES_USER: ${POSTGRES_USER:-braintrust}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-braintrust}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-braintrust}
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j-data:/data

  cloudflared:
    image: cloudflare/cloudflared:latest
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped

volumes:
  postgres-data:
  neo4j-data:
