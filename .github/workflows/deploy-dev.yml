name: Deploy Dev Stack

on:
  workflow_dispatch:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - slack-agent-updated
      - offboard-me-updated

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout infra
        uses: actions/checkout@v4

      - name: Checkout offboard-me
        uses: actions/checkout@v4
        with:
          repository: PaAmbTomaquetYOle/offboard-me
          ref: main
          path: offboard-me

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: PaAmbTomaquetYOle/backend
          ref: main
          path: backend

      - name: Checkout mcp-server
        uses: actions/checkout@v4
        with:
          repository: PaAmbTomaquetYOle/mcp-server
          ref: main
          path: mcp-server

      - name: Normalize workspace layout
        run: |
          rm -rf ../offboard-me ../backend ../mcp-server
          mv offboard-me ../offboard-me
          mv backend ../backend
          mv mcp-server ../mcp-server
        working-directory: .

      - name: Validate Docker
        run: |
          sudo docker --version
          sudo docker compose version
        working-directory: .

      - name: Prepare runtime env
        run: |
          if [ -f /opt/braintrust/infra/.env ]; then
            cp /opt/braintrust/infra/.env .env
          else
            cp .env.example .env
          fi
        working-directory: .

      - name: Build and restart stack
        run: sudo docker compose up -d --build --remove-orphans
        working-directory: .

      - name: Smoke check
        run: bash ./scripts/smoke-check.sh
        working-directory: .
