name: Deploy Dev Stack

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feat/hackathon-dev-stack

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout infra
        uses: actions/checkout@v4

      - name: Checkout slack-agent
        uses: actions/checkout@v4
        with:
          repository: PaAmbTomaquetYOle/slack-agent
          ref: feat/hackathon-dev-stack
          path: slack-agent

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: PaAmbTomaquetYOle/backend
          ref: feat/hackathon-dev-stack
          path: backend

      - name: Checkout mcp-server
        uses: actions/checkout@v4
        with:
          repository: PaAmbTomaquetYOle/mcp-server
          ref: feat/hackathon-dev-stack
          path: mcp-server

      - name: Validate Docker
        run: |
          docker --version
          docker compose version
        working-directory: .

      - name: Prepare runtime env
        run: |
          if [ -f /opt/braintrust/infra/.env ]; then
            cp /opt/braintrust/infra/.env .env
          else
            cp .env.example .env
          fi
        working-directory: .

      - name: Build and restart stack
        run: docker compose up -d --build --remove-orphans
        working-directory: .

      - name: Smoke check
        shell: pwsh
        run: ./scripts/smoke-check.ps1
        working-directory: .
