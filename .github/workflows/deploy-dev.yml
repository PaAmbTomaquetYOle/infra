name: Deploy Dev Stack

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout infra
        uses: actions/checkout@v4

      - name: Checkout slack-agent
        uses: actions/checkout@v4
        with:
          repository: PaAmbTomaquetYOle/slack-agent
          ref: main
          path: slack-agent

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: PaAmbTomaquetYOle/backend
          ref: main
          path: backend

      - name: Checkout mcp-server
        uses: actions/checkout@v4
        with:
          repository: PaAmbTomaquetYOle/mcp-server
          ref: main
          path: mcp-server

      - name: Normalize workspace layout
        run: |
          rm -rf ../slack-agent ../backend ../mcp-server
          mv slack-agent ../slack-agent
          mv backend ../backend
          mv mcp-server ../mcp-server
        working-directory: .

      - name: Validate Docker
        run: |
          sudo docker --version
          sudo docker compose version
        working-directory: .

      - name: Prepare runtime env
        run: |
          if [ -f /opt/braintrust/infra/.env ]; then
            cp /opt/braintrust/infra/.env .env
          else
            cp .env.example .env
          fi
        working-directory: .

      - name: Build and restart stack
        run: sudo docker compose up -d --build --remove-orphans
        working-directory: .

      - name: Smoke check
        run: |
          curl --fail --silent http://localhost:3000/health > /dev/null
          curl --fail --silent http://localhost:8000/health > /dev/null
          curl --fail --silent http://localhost:8001/api/v1/health > /dev/null
        working-directory: .
